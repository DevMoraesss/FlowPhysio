# ==============================================================================
# AMBIENTE PRODUÇÃO
# Stack completo otimizado para produção
# ==============================================================================
# Uso: docker-compose -f docker-compose.prod.yaml up -d
# IMPORTANTE: Substituir variáveis de ambiente por valores seguros antes de usar!

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: PhysioFlow-api
    restart: always
    ports:
      - "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-PhysioFlow}
      - Jwt__Audience=${JWT_AUDIENCE:-PhysioFlowUsers}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - PhysioFlow-prod-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: PhysioFlow-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-PhysioFlow}
      POSTGRES_USER: ${POSTGRES_USER:-PhysioFlow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-PhysioFlow_user}" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - PhysioFlow-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  PhysioFlow-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
