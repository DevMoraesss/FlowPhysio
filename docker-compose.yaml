version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: PhysioFlow-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=PhysioFlow;Username=postgres;Password=postgres
      - Jwt__Secret=PhysioFlowDockerSecretKey2026AtLeast32CharactersLong!
      - Jwt__Issuer=PhysioFlow
      - Jwt__Audience=PhysioFlowUsers
    depends_on:
      db:
        condition: service_healthy
    networks:
      - PhysioFlow-network

  db:
    image: postgres:16-alpine
    container_name: PhysioFlow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: PhysioFlow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - PhysioFlow-network

networks:
  PhysioFlow-network:
    driver: bridge

volumes:
  postgres_data:
